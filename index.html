        function loadSubjects() {
            const branchKey = document.getElementById("branchSelect").value;
            const sem = document.getElementById("semesterSelect").value;
            const subjects = branchMap[branchKey][sem] || [];
            let table = document.getElementById("subjectsTable");

            table.innerHTML = `<tr><th>Subject</th><th>Grade Point</th><th>Credit</th></tr>`;
            subjects.forEach((subject, index) => {
                let row = table.insertRow();
                row.insertCell(0).innerText = subject.subname;
                row.insertCell(1).innerHTML = `<input type="range" min="0" max="10" value="10" class="slider" id="gp${index}" oninput="updateGPA()"> <span id="gpVal${index}">10 A+</span>`;
                row.insertCell(2).innerText = subject.credit;
            });
            updateGPA();
        }

        function updateGPA() {
            const branchKey = document.getElementById("branchSelect").value;
            const sem = document.getElementById("semesterSelect").value;
            const subjects = branchMap[branchKey][sem] || [];
            let totalGP = 0, totalCredits = 0;

            subjects.forEach((subject, index) => {
                let gp = document.getElementById(`gp${index}`).value;
                document.getElementById(`gpVal${index}`).innerText = gp + " " + gradeMap[gp];
                totalGP += gp * subject.credit;
                totalCredits += subject.credit;
            });

            let gpa = totalCredits ? (totalGP / totalCredits).toFixed(2) : "0.00";
            document.getElementById("gpaResult").innerText = `SGPA: ${gpa} \n Credits: ${totalGP / 10}/${totalCredits}`;
        }
