<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e3ffd1;
            text-align: center;
            padding: 0;
            margin: 0;
        }

        .container {
            background: white;
            padding: 20px;
            max-width: 800px;
            margin: auto;
            border-radius: 10px;
            height: 100%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        select {
            width: 100%;
            padding: 8px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }

        th, td {
            padding: 8px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
        }

        input[type="range"] {
            width: 90%;
        }

        .result {
            font-size: 20px;
            font-weight: bold;
            margin-top: 10px;
            color: #02006e;
        }
    </style>
</head>
<body>
<div class="container">
    <h4>SGPA Calculator - Anuj S ECE</h4>
    <label for="semesterSelect">Select Semester:</label>
    <select id="semesterSelect" onchange="loadSubjects()">
        <option value="1">Semester 1</option>
        <option value="2">Semester 2</option>
        <option value="3">Semester 3 ECE</option>
        <option value="4">Semester 4 ECE</option>
        <option value="5">Semester 5 ECE</option>
        <option value="6">Semester 6 ECE</option>
        <option value="7">Semester 7 ECE</option>
        <option value="8">Semester 8 ECE</option>
    </select>
    <table id="subjectsTable" border="1" width="100%">
        <tr>
            <th>Subject</th>
            <th>Grade Point</th>
            <th>Credit</th>
        </tr>
    </table>
    <div class="result" id="gpaResult">GPA: 0.00</div>
</div>

<script>
    const semesterSubjects = {
        1: [
            {subname: "Physics Laboratory", credit: 1},
            {subname: "Mathematics 1", credit: 4},
            {subname: "Engineering Mechanics Laboratory", credit: 1},
            {subname: "Physics", credit: 3},
            {subname: "Physical Education", credit: 1},
            {subname: "Computer Programming Laboratory", credit: 1},
            {subname: "Communication Skill", credit: 1},
            {subname: "Engineering Graphics Laboratory", credit: 1},
            {subname: "Engineering Graphics", credit: 1},
            {subname: "Computer Programming & Problem Solving", credit: 2},
            {subname: "Engineering Mechanics", credit: 4}
        ],
        2: [
            {subname: "Mathematics II", credit: 4},
            {subname: "Engineering Chemistry", credit: 3},
            {subname: "Basic Electrical & Electronics Engineering", credit: 4},
            {subname: "Manufacturing Science", credit: 1},
            {subname: "Environmental Science", credit: 2},
            {subname: "Biology for Engineers", credit: 2},
            {subname: "Engineering Chemistry Lab", credit: 1},
            {subname: "Basic Electrical & Electronics Engineering Laboratory", credit: 1},
            {subname: "MS Lab", credit: 1},
            {subname: "Language Laboratory", credit: 1},
            {subname: "NSS / Yoga", credit: 1}
        ],
        3: [
            {subname: 'Network Analysis and Synthesis', credit: 3},
            {subname: 'Digital Circuit Design', credit: 3},
            {subname: 'Electronic Circuits and Devices', credit: 3},
            {subname: 'Signals & Systems', credit: 3},
            {subname: 'Professional Practices', credit: 2},
            {subname: 'Fundamental of Design Methods', credit: 3},
            {subname: 'Applied Numerical Methods', credit: 4},
            {subname: 'Network Lab', credit: 1},
            {subname: 'Digital Ckt design Lab', credit: 1},
            {subname: 'Electronics Circuit Lab', credit: 1},
        ],
        4: [
            {"subname": "Fundamentals of Entrepreneurship", "credit": 3},
            {"subname": "Digital Signal Processing", "credit": 3},
            {"subname": "Linear Integrated Circuits", "credit": 3},
            {"subname": "Microprocessors and Microcontrollers", "credit": 3},
            {"subname": "EM Fields and Transmission Lines", "credit": 3},
            {"subname": "Electronic Instrumentation and Measurement", "credit": 3},
            {"subname": "Linear Integrated Circuits lab", "credit": 1},
            {"subname": "Microprocessors and Micro Controllers Lab", "credit": 1},
            {"subname": "Digital Signal Processing Lab", "credit": 1},
            {"subname": "ProjectBasedLab1", "credit": 1}
        ],

        "5": [
            {"subname": "Data Structures and Algorithm", "credit": 4},
            {"subname": "Information theory and coding", "credit": 4},
            {"subname": "Control Systems", "credit": 3},
            {"subname": "Communication Systems", "credit": 3},
            {"subname": "VLSI Design", "credit": 3},
            {"subname": "Departmental Elective-1(A)", "credit": 3},
            {"subname": "Communication Systems Lab", "credit": 1},
            {"subname": "Control and instrumentation lab", "credit": 1},
            {"subname": "VLSI Design Lab", "credit": 1},
            {"subname": "Internship / Industrial Training", "credit": 1}
        ],
        "6": [
            {"subname": "Engineering Management", "credit": 3},
            {"subname": "Digital Image Processing", "credit": 4},
            {"subname": "Optical Communication", "credit": 3},
            {"subname": "Microwave Engineering", "credit": 3},
            {"subname": "Departmental Elective-2(A)", "credit": 3},
            {"subname": "Digital Image Processing Lab", "credit": 1},
            {"subname": "Optical communication lab", "credit": 1},
            {"subname": "Microwave Engineering lab", "credit": 1},
            {"subname": "Project-1", "credit": 1}
        ],
        "7": [
            {"subname": "Engineering Economics and IPR", "credit": 3},
            {"subname": "RF and Antenna Design", "credit": 3},
            {"subname": "Departmental Elective-3(A)", "credit": 3},
            {"subname": "Departmental Elective-4(A)", "credit": 3},
            {"subname": "Open Elective-1(C)", "credit": 3},
            {"subname": "RF & Antenna Lab", "credit": 1},
            {"subname": "Project Based Lab-2", "credit": 2},
            {"subname": "Industrial/Field Training", "credit": 1}
        ],
        "8": [
            {"subname": "Departmental Elective-5 (A) (NPTEL/SWAYAM)", "credit": 3},
            {"subname": "Departmental Elective-6 (A) (NPTEL/SWAYAM)", "credit": 3},
            {"subname": "Internship/Project 2", "credit": 8},
            {"subname": "General Proficiency", "credit": 1}
        ]

    };

    const gradeMap = {10: "A+", 9: "A", 8: "B+", 7: "B", 6: "C+", 5: "C", 4: "D", 3: "D", 2: "F", 1: "F", 0: "F"};

    function loadSubjects() {
        const semester = document.getElementById("semesterSelect").value;
        const subjects = semesterSubjects[semester];
        let table = document.getElementById("subjectsTable");

        // Clear existing rows except the header
        table.innerHTML = `<tr>
            <th>Subject</th>
            <th>Grade Point</th>
            <th>Credit</th>
        </tr>`;

        subjects.forEach((subject, index) => {
            let row = table.insertRow();
            let cell1 = row.insertCell(0);
            let cell2 = row.insertCell(1);
            let cell3 = row.insertCell(2);

            cell1.innerText = subject.subname;
            cell2.innerHTML = `<input type="range" min="0" max="10" value="10" class="slider" id="gp${index}" oninput="updateGPA()"> <span id="gpVal${index}">10 A+</span>`;
            cell3.innerText = subject.credit;
        });

        updateGPA();
    }

    function updateGPA() {
        const semester = document.getElementById("semesterSelect").value;
        const subjects = semesterSubjects[semester];

        let totalGradePoints = 0;
        let totalCredits = 0;

        subjects.forEach((subject, index) => {
            let gp = document.getElementById(`gp${index}`).value;
            document.getElementById(`gpVal${index}`).innerText = gp + " " + gradeMap[gp];
            totalGradePoints += gp * subject.credit;
            totalCredits += subject.credit;
        });

        let gpa = (totalGradePoints / totalCredits).toFixed(2);
        document.getElementById("gpaResult").innerText = `SGPA: ${gpa}  \n    Credits: ${totalGradePoints/10}/${totalCredits}`;
    }

    // Load semester 1 by default
    loadSubjects();
</script>
</body>
</html>
